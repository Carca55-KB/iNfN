<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il viaggio di Atom Men - INFN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b0e17;
      color: #e8edf5;
      line-height: 1.6;
      padding-top: 60px;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #0f1420;
      border-bottom: 1px solid #2a3a6a;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      z-index: 100;
    }
    nav .nav-title {
      color: #64b5f6;
      font-weight: 700;
      font-size: 1rem;
      margin-right: 2rem;
    }
    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown-btn {
      background: #1a2235;
      color: #b0c4de;
      border: 1px solid #2a3a6a;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .dropdown-btn:hover {
      background: #2a3a6a;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #141a28;
      border: 1px solid #2a3a6a;
      border-radius: 8px;
      min-width: 220px;
      padding: 0.4rem 0;
      margin-top: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .dropdown-content a {
      display: block;
      padding: 0.6rem 1.2rem;
      color: #b0c4de;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .dropdown-content a:hover {
      background: #1f2a45;
      color: #64b5f6;
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }
    header {
      text-align: center;
      padding: 4rem 2rem 2rem;
      background: linear-gradient(135deg, #0b0e17 0%, #1a1f2e 100%);
      border-bottom: 2px solid #2a3a6a;
    }
    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #64b5f6, #ce93d8, #64b5f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    header p {
      color: #8899bb;
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }
    .gallery {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .gallery-item {
      background: #141a28;
      border: 1px solid #2a3a6a;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(100, 181, 246, 0.15);
    }
    .gallery-item .placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #1a2235;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a4a6a;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .gallery-item h3 {
      color: #ce93d8;
      font-size: 1.1rem;
    }
    .gallery-item p {
      color: #b0c4de;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #556688;
    }
    .empty-state span {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: #556688;
      font-size: 0.85rem;
      border-top: 1px solid #1a1f2e;
    }
  </style>
</head>
<body>

<nav>

    <button class="dropdown-btn">Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Evoluzione del modello atomico</a>
      <a href="il-viaggio-di-atom-men.html">Il viaggio di Atom Men</a>
    </div>
  </div>
</nav>

<header>
  <h1>Il viaggio di Atom Men</h1>
  <p>Immagini e contenuti in arrivo</p>
</header>

<div class="empty-state">
  <span>🖼</span>
  <p>Qui verranno inserite le immagini del viaggio di Atom Men.</p>
</div>

<footer>
  INFN · Il viaggio di Atom Men
</footer>

</body>
